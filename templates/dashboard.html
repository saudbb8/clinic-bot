<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sophie — Clinic OS</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f14;--bg2:#13161d;--bg3:#1a1e28;--bg4:#222736;
  --border:#2a2f3e;--border2:#353c50;
  --text:#e8eaf0;--text2:#8890a4;--text3:#4a5168;
  --green:#00d97e;--green2:#00b868;--gb:rgba(0,217,126,0.08);--gbd:rgba(0,217,126,0.2);
  --amber:#f5a623;--ab:rgba(245,166,35,0.08);
  --red:#ff4d6d;--rb:rgba(255,77,109,0.08);
  --blue:#4d9fff;--bb:rgba(77,159,255,0.08);
  --purple:#a78bfa;--pb:rgba(167,139,250,0.08);
  --font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;
  --sw:220px;--r:10px;--r2:14px;
}
[data-theme="light"]{
  --bg:#f0f4f8;--bg2:#fff;--bg3:#f4f6fb;--bg4:#e8ecf5;
  --border:#e2e6f0;--border2:#cdd3e8;
  --text:#0d0f14;--text2:#4a5168;--text3:#8890a4;
  --green:#00a86b;--green2:#008f5a;--gb:rgba(0,168,107,0.08);--gbd:rgba(0,168,107,0.2);
  --amber:#c47d0a;--ab:rgba(196,125,10,0.08);
  --red:#d63057;--rb:rgba(214,48,87,0.08);
  --blue:#2b7fe0;--bb:rgba(43,127,224,0.08);
  --purple:#7c3aed;--pb:rgba(124,58,237,0.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;transition:background .2s,color .2s}
button{font-family:var(--font);cursor:pointer}
input,select,textarea{font-family:var(--font)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,217,126,0.4)}50%{box-shadow:0 0 0 6px rgba(0,217,126,0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

const api = {
  get: url => fetch(url).then(r=>r.json()).catch(()=>({})),
  post: (url,data) => fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}).then(r=>r.json()).catch(()=>({})),
};

const fmtDate = d => `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
const fmtDisp = d => {
  const t=new Date(),tm=new Date(t);tm.setDate(t.getDate()+1);
  if(d.toDateString()===t.toDateString())return'Today';
  if(d.toDateString()===tm.toDateString())return'Tomorrow';
  return d.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
};
const inits = n=>(n||'?').split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2);
const aColor = n=>{const c=['green','blue','purple','amber'];return c[((n||'A').charCodeAt(0))%c.length];};
const statusType = s=>{const v=(s||'').toLowerCase();return v==='confirmed'||v==='yes'?'confirmed':v==='cancelled'||v==='no'?'cancelled':'pending';};

// ── STYLES ────────────────────────────────────────────────────────────────────
const pill = type=>{
  const m={confirmed:{bg:'var(--gb)',c:'var(--green)'},pending:{bg:'var(--ab)',c:'var(--amber)'},cancelled:{bg:'var(--rb)',c:'var(--red)'},sent:{bg:'var(--bb)',c:'var(--blue)'},none:{bg:'var(--bg4)',c:'var(--text3)'}};
  const s=m[type]||m.none;
  return{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:500,background:s.bg,color:s.c,whiteSpace:'nowrap',fontFamily:'var(--mono)'};
};
const card={background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--r2)',overflow:'hidden',marginBottom:16};
const cardHead={display:'flex',alignItems:'center',justifyContent:'space-between',padding:'13px 18px',borderBottom:'1px solid var(--border)',flexWrap:'wrap',gap:8};
const inp={width:'100%',padding:'8px 12px',border:'1px solid var(--border)',borderRadius:'var(--r)',background:'var(--bg3)',color:'var(--text)',fontSize:13,outline:'none'};
const btn=(v='ghost')=>({display:'inline-flex',alignItems:'center',gap:6,padding:'7px 14px',borderRadius:'var(--r)',fontSize:13,fontWeight:500,border:'1px solid',cursor:'pointer',transition:'all .15s',...(v==='primary'?{background:'var(--green)',color:'var(--bg)',borderColor:'var(--green)'}:{background:'transparent',color:'var(--text2)',borderColor:'var(--border)'})});
const avatarStyle = color=>{const m={green:{bg:'var(--gb)',c:'var(--green)'},blue:{bg:'var(--bb)',c:'var(--blue)'},purple:{bg:'var(--pb)',c:'var(--purple)'},amber:{bg:'var(--ab)',c:'var(--amber)'}};const s=m[color]||m.green;return{width:30,height:30,borderRadius:8,background:s.bg,color:s.c,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,flexShrink:0,fontFamily:'var(--mono)'};};
const statCard = color=>{const m={green:'var(--green)',blue:'var(--blue)',amber:'var(--amber)',red:'var(--red)'};return{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--r2)',padding:'16px 18px',cursor:'pointer',transition:'all .15s',borderBottom:`2px solid ${m[color]||m.blue}`};};

// ── ATOMS ─────────────────────────────────────────────────────────────────────
const Spin = ()=><div style={{textAlign:'center',padding:40,color:'var(--text3)',fontSize:13}}>Loading...</div>;
const Empty = ({msg='No data found'})=><div style={{textAlign:'center',padding:48,color:'var(--text3)',fontSize:13}}>{msg}</div>;

const Avatar = ({name,size=30})=>(
  <div style={{...avatarStyle(aColor(name)),width:size,height:size,fontSize:size>30?12:10}}>{inits(name)}</div>
);

const StatusPill = ({status})=>{
  const t=statusType(status);
  return <span style={pill(t)}>{t==='confirmed'?'✓ Confirmed':t==='cancelled'?'✕ Cancelled':'⏳ Awaiting'}</span>;
};

const ReminderPill = ({val})=>{
  const sent=(val||'').toLowerCase()==='yes'||(val||'').toLowerCase()==='sent';
  return <span style={pill(sent?'sent':'none')}>{sent?'✓ Sent':'Not sent'}</span>;
};

const Toast = ({msg,type})=>(
  <div style={{position:'fixed',bottom:24,right:24,background:'var(--bg2)',border:'1px solid var(--border)',borderLeft:`3px solid ${type==='error'?'var(--red)':'var(--green)'}`,padding:'12px 18px',borderRadius:10,fontSize:13,color:'var(--text)',zIndex:9999,animation:'slideUp .2s ease',boxShadow:'0 4px 20px rgba(0,0,0,0.3)',maxWidth:320}}>
    {msg}
  </div>
);

const Modal = ({open,onClose,title,subtitle,children,wide})=>{
  if(!open)return null;
  return(
    <div onClick={e=>{if(e.target===e.currentTarget)onClose()}} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.65)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'}}>
      <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:18,padding:28,width:'100%',maxWidth:wide?640:460,margin:20,maxHeight:'90vh',overflowY:'auto',animation:'fadeIn .15s ease'}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:20}}>
          <div>
            <div style={{fontSize:16,fontWeight:600,color:'var(--text)'}}>{title}</div>
            {subtitle&&<div style={{fontSize:12,color:'var(--text3)',marginTop:3}}>{subtitle}</div>}
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'var(--text3)',fontSize:20,cursor:'pointer',padding:'0 0 0 12px',lineHeight:1}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
};

const FG = ({label,children,half})=>(
  <div style={{marginBottom:14,gridColumn:half?'auto':'span 1'}}>
    <label style={{display:'block',fontSize:11,fontWeight:600,color:'var(--text2)',marginBottom:5,textTransform:'uppercase',letterSpacing:'0.05em',fontFamily:'var(--mono)'}}>{label}</label>
    {children}
  </div>
);

const Toggle = ({checked,onChange})=>(
  <div onClick={()=>onChange(!checked)} style={{width:38,height:22,borderRadius:11,background:checked?'var(--green)':'var(--bg4)',cursor:'pointer',position:'relative',transition:'background .2s',flexShrink:0}}>
    <div style={{position:'absolute',width:16,height:16,borderRadius:'50%',background:'white',top:3,left:checked?19:3,transition:'left .2s',boxShadow:'0 1px 3px rgba(0,0,0,0.3)'}}/>
  </div>
);

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
const Sidebar = ({page,setPage,clinic})=>{
  const nav=(id,label,icon)=>(
    <div key={id} onClick={()=>setPage(id)}
      style={{display:'flex',alignItems:'center',gap:9,padding:'8px 10px',borderRadius:8,color:page===id?'var(--green)':'var(--text2)',background:page===id?'var(--gb)':'transparent',fontSize:13,fontWeight:page===id?500:400,cursor:'pointer',marginBottom:1,transition:'all .15s',userSelect:'none'}}
      onMouseOver={e=>{if(page!==id)e.currentTarget.style.background='var(--bg3)'}}
      onMouseOut={e=>{if(page!==id)e.currentTarget.style.background='transparent'}}>
      <span style={{fontSize:16,flexShrink:0}}>{icon}</span>
      <span>{label}</span>
    </div>
  );
  const sec=label=><div style={{fontSize:10,color:'var(--text3)',fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',padding:'12px 8px 4px'}}>{label}</div>;
  return(
    <div style={{position:'fixed',left:0,top:0,bottom:0,width:'var(--sw)',background:'var(--bg2)',borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',zIndex:100}}>
      <div style={{padding:'18px 16px 14px',borderBottom:'1px solid var(--border)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:32,height:32,borderRadius:9,background:'var(--green)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 0 16px rgba(0,217,126,0.3)',flexShrink:0,fontSize:16}}>📍</div>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:'var(--text)',lineHeight:1.2}}>{clinic?.name||'Clinic OS'}</div>
            <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)'}}>clinic-os v2.0</div>
          </div>
        </div>
      </div>
      <nav style={{padding:'8px 10px',flex:1,overflowY:'auto'}}>
        {sec('Overview')}
        {nav('dashboard','Dashboard','📊')}
        {sec('Clinic')}
        {nav('appointments','Appointments','📅')}
        {nav('patients','Patients','👥')}
        {sec('Sophie AI')}
        {nav('chat','Live chat','💬')}
        {nav('analytics','Analytics','📈')}
        {sec('System')}
        {nav('settings','Settings','⚙️')}
      </nav>
      <div style={{padding:14,borderTop:'1px solid var(--border)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,background:'var(--gb)',border:'1px solid var(--gbd)',borderRadius:8,padding:'9px 12px'}}>
          <div style={{width:7,height:7,borderRadius:'50%',background:'var(--green)',animation:'pulse 2s ease infinite',flexShrink:0}}/>
          <div>
            <div style={{fontSize:11,fontWeight:500,color:'var(--green)',fontFamily:'var(--mono)'}}>Sophie online</div>
            <div style={{fontSize:10,color:'var(--text3)'}}>AI receptionist active</div>
          </div>
        </div>
      </div>
    </div>
  );
};

// ── PATIENT DETAIL MODAL ──────────────────────────────────────────────────────
const PatientDetailModal = ({patient,open,onClose,showToast,onRefresh})=>{
  const [sending,setSending]=useState(false);
  const [msg,setMsg]=useState('');
  const [status,setStatus]=useState(patient?.Status||'');

  useEffect(()=>{if(patient)setStatus(patient.Status||'');},[patient]);

  if(!patient)return null;

  const updateStatus = async(newStatus)=>{
    await api.post('/api/update_status',{name:patient['Patient Name'],date:patient['Appointment Date'],status:newStatus});
    setStatus(newStatus);
    showToast('Status updated to '+newStatus);
    onRefresh();
  };

  const sendMsg = async()=>{
    if(!msg.trim())return;
    setSending(true);
    const r=await api.post('/api/chat/send',{phone:patient['Phone Number'],name:patient['Patient Name'],message:msg});
    setSending(false);
    if(r.success){showToast('Message sent to '+patient['Patient Name']);setMsg('');}
    else showToast('Failed to send — check Twilio sandbox','error');
  };

  const sendReminder = async()=>{
    setSending(true);
    const r=await api.post('/api/send_reminder',{name:patient['Patient Name'],phone:patient['Phone Number'],date:patient['Appointment Date'],time:patient['Appointment Time']});
    setSending(false);
    if(r.success){showToast('Reminder sent!');onRefresh();}
    else showToast('Failed to send reminder','error');
  };

  const fields=[
    {l:'Full name',v:patient['Patient Name']},
    {l:'Phone (WhatsApp)',v:patient['Phone Number']},
    {l:'Appointment date',v:patient['Appointment Date']},
    {l:'Appointment time',v:patient['Appointment Time']},
    {l:'Practitioner',v:patient['Practitioner']||'Any available'},
    {l:'Reminder sent',v:patient['Reminder Sent']||'No'},
  ];

  return(
    <Modal open={open} onClose={onClose} title="Patient details" subtitle="View and manage this patient" wide>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
        <div style={{background:'var(--bg3)',borderRadius:'var(--r2)',padding:16}}>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
            <Avatar name={patient['Patient Name']||'?'} size={44}/>
            <div>
              <div style={{fontSize:15,fontWeight:600,color:'var(--text)'}}>{patient['Patient Name']||'Unknown'}</div>
              <div style={{fontSize:12,color:'var(--text3)',fontFamily:'var(--mono)'}}>{patient['Phone Number']||'No phone'}</div>
            </div>
          </div>
          {fields.map(f=>(
            <div key={f.l} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid var(--border)'}}>
              <span style={{fontSize:11,color:'var(--text3)'}}>{f.l}</span>
              <span style={{fontSize:12,fontWeight:500,color:'var(--text)',textAlign:'right',maxWidth:160}}>{f.v||'—'}</span>
            </div>
          ))}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <div style={{background:'var(--bg3)',borderRadius:'var(--r2)',padding:16}}>
            <div style={{fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:12}}>Current status</div>
            <StatusPill status={status}/>
            <div style={{display:'flex',flexDirection:'column',gap:6,marginTop:12}}>
              {['Confirmed','Pending','Cancelled'].map(s=>(
                <button key={s} onClick={()=>updateStatus(s)} style={{...btn(status.toLowerCase()===s.toLowerCase()?'primary':'ghost'),justifyContent:'center',fontSize:12,padding:'6px 12px'}}>
                  {s==='Confirmed'?'✓ Mark confirmed':s==='Cancelled'?'✕ Mark cancelled':'⏳ Mark pending'}
                </button>
              ))}
            </div>
          </div>
          <div style={{background:'var(--bg3)',borderRadius:'var(--r2)',padding:16}}>
            <div style={{fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:10}}>Quick actions</div>
            <button onClick={sendReminder} disabled={sending} style={{...btn('primary'),width:'100%',justifyContent:'center',marginBottom:8,opacity:sending?.6:1}}>
              📱 Send reminder
            </button>
            <div style={{fontSize:11,color:'var(--text3)',textAlign:'center'}}>
              {patient['Phone Number']
                ? 'Will WhatsApp '+patient['Phone Number']
                : '⚠️ No phone number saved'}
            </div>
          </div>
        </div>
      </div>
      <div style={{background:'var(--bg3)',borderRadius:'var(--r2)',padding:16}}>
        <div style={{fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:10}}>Send custom message as Sophie</div>
        <div style={{fontSize:11,color:'var(--text3)',marginBottom:10,padding:'8px 10px',background:'var(--ab)',borderRadius:8,borderLeft:'3px solid var(--amber)'}}>
          ⚠️ Twilio trial: patient must first text <strong style={{color:'var(--amber)'}}>"join tribe-smallest"</strong> to +1 415 523 8886 on WhatsApp before they can receive messages.
        </div>
        <textarea value={msg} onChange={e=>setMsg(e.target.value)} placeholder="Type a message to send as Sophie..." style={{...inp,resize:'vertical',minHeight:72,marginBottom:8}}/>
        <button onClick={sendMsg} disabled={sending||!msg.trim()} style={{...btn('primary'),opacity:(sending||!msg.trim())?.5:1}}>
          {sending?'Sending...':'Send as Sophie'}
        </button>
      </div>
    </Modal>
  );
};

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
const Dashboard = ({openModal,setPage,showToast})=>{
  const [stats,setStats]=useState(null);
  const [appts,setAppts]=useState([]);
  const [date,setDate]=useState(new Date());
  const [loading,setLoading]=useState(true);

  const load=useCallback(async()=>{
    setLoading(true);
    const [s,a]=await Promise.all([api.get('/api/stats'),api.get(`/api/appointments?date=${encodeURIComponent(fmtDate(date))}`)]);
    setStats(s);setAppts(a.appointments||[]);setLoading(false);
  },[date]);

  useEffect(()=>{load();},[load]);

  return(
    <div style={{animation:'fadeIn .2s ease'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:22}}>
        {[
          {label:'Today',val:stats?.today_total??'—',sub:'appointments',color:'blue',icon:'📅'},
          {label:'Confirmed',val:stats?.confirmed??'—',sub:(stats?.confirmation_rate??0)+'% rate',color:'green',icon:'✅'},
          {label:'Awaiting',val:stats?.pending??'—',sub:'reminder sent',color:'amber',icon:'⏳'},
          {label:'Cancelled',val:stats?.cancelled??'—',sub:'week: '+(stats?.week_noshows??0),color:'red',icon:'❌'},
        ].map(s=>(
          <div key={s.label} style={statCard(s.color)} onClick={()=>s.label==='Today'&&setPage('appointments')}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
              <span style={{fontSize:20}}>{s.icon}</span>
              <span style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--text3)'}}>{s.sub}</span>
            </div>
            <div style={{fontSize:30,fontWeight:700,color:'var(--text)',fontFamily:'var(--mono)',lineHeight:1,marginBottom:4}}>{s.val}</div>
            <div style={{fontSize:12,color:'var(--text2)'}}>{s.label}</div>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 300px',gap:16}}>
        <div style={card}>
          <div style={cardHead}>
            <div>
              <div style={{fontSize:13,fontWeight:600}}>Schedule</div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{fmtDisp(date)}</div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:8,padding:'4px 8px'}}>
              <button onClick={()=>{const d=new Date(date);d.setDate(d.getDate()-1);setDate(d);}} style={{background:'none',border:'none',color:'var(--text2)',cursor:'pointer',fontSize:16}}>‹</button>
              <span style={{fontSize:12,fontFamily:'var(--mono)',color:'var(--text)',minWidth:70,textAlign:'center'}}>{fmtDisp(date)}</span>
              <button onClick={()=>{const d=new Date(date);d.setDate(d.getDate()+1);setDate(d);}} style={{background:'none',border:'none',color:'var(--text2)',cursor:'pointer',fontSize:16}}>›</button>
            </div>
          </div>
          {loading?<Spin/>:appts.length===0?<Empty msg="No appointments for this date"/>:
            appts.map((a,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 18px',borderBottom:'1px solid var(--border)',transition:'background .1s',cursor:'pointer'}}
                onMouseOver={e=>e.currentTarget.style.background='var(--bg3)'}
                onMouseOut={e=>e.currentTarget.style.background='transparent'}>
                <span style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--text2)',minWidth:52}}>{a['Appointment Time']||'—'}</span>
                <Avatar name={a['Patient Name']||'?'}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:500}}>{a['Patient Name']||'Unknown'}</div>
                  <div style={{fontSize:11,color:'var(--text3)'}}>{(a['Practitioner']||'Any').split('—')[0].trim()}</div>
                </div>
                <StatusPill status={a['Status']}/>
              </div>
            ))
          }
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={card}>
            <div style={cardHead}><div style={{fontSize:13,fontWeight:600}}>Sophie activity</div></div>
            <div style={{padding:'8px 14px'}}>
              {[
                {dot:'var(--green)',title:'24hr reminders sent',sub:'Auto · runs daily at 2pm'},
                {dot:'var(--green)',title:'Patient confirms → status updates',sub:'Auto · no staff needed'},
                {dot:'var(--amber)',title:'Reschedule handled by Sophie',sub:'Auto · rebooks patient'},
                {dot:'var(--green)',title:'Welcome msg on booking',sub:'Auto · new patients notified'},
              ].map((a,i)=>(
                <div key={i} style={{display:'flex',gap:10,padding:'9px 0',borderBottom:i<3?'1px solid var(--border)':'none'}}>
                  <div style={{width:6,height:6,borderRadius:'50%',background:a.dot,marginTop:5,flexShrink:0}}/>
                  <div>
                    <div style={{fontSize:12,fontWeight:500,color:'var(--text)'}}>{a.title}</div>
                    <div style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:1}}>{a.sub}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div style={card}>
            <div style={cardHead}><div style={{fontSize:13,fontWeight:600}}>Savings</div></div>

// ── APPOINTMENTS ──────────────────────────────────────────────────────────────
const Appointments = ({openModal,showToast})=>{
  const [appts,setAppts]=useState([]);
  const [loading,setLoading]=useState(true);
  const [date,setDate]=useState(new Date());
  const [filter,setFilter]=useState('all');
  const [search,setSearch]=useState('');
  const [selected,setSelected]=useState(null);

  const load=useCallback(async()=>{
    setLoading(true);
    const d=await api.get(`/api/appointments?date=${encodeURIComponent(fmtDate(date))}`);
    setAppts(d.appointments||[]);setLoading(false);
  },[date]);

  useEffect(()=>{load();},[load]);

  const filtered=appts.filter(a=>{
    const s=(a['Status']||'').toLowerCase();
    const ok=filter==='confirmed'?(s==='confirmed'||s==='yes'):filter==='pending'?(!s||s==='awaiting'||s==='pending'):filter==='cancelled'?(s==='cancelled'||s==='no'):true;
    const q=search.toLowerCase();
    return ok&&(!q||(a['Patient Name']||'').toLowerCase().includes(q)||(a['Phone Number']||'').includes(q));
  });

  const sendReminder=async(a,e)=>{
    e.stopPropagation();
    const r=await api.post('/api/send_reminder',{name:a['Patient Name'],phone:a['Phone Number'],date:a['Appointment Date'],time:a['Appointment Time']});
    if(r.success){showToast('Reminder sent to '+a['Patient Name']);load();}
    else showToast('Failed — check Twilio sandbox','error');
  };

  const confirm=async(a,e)=>{
    e.stopPropagation();
    await api.post('/api/update_status',{name:a['Patient Name'],date:a['Appointment Date'],status:'Confirmed'});
    showToast(a['Patient Name']+' confirmed');load();
  };

  return(
    <div style={{animation:'fadeIn .2s ease'}}>
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:18,gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:6,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'4px 8px'}}>
          <button onClick={()=>{const d=new Date(date);d.setDate(d.getDate()-1);setDate(d);}} style={{background:'none',border:'none',color:'var(--text2)',cursor:'pointer',fontSize:16}}>‹</button>
          <span style={{fontSize:12,fontFamily:'var(--mono)',color:'var(--text)',minWidth:70,textAlign:'center'}}>{fmtDisp(date)}</span>
          <button onClick={()=>{const d=new Date(date);d.setDate(d.getDate()+1);setDate(d);}} style={{background:'none',border:'none',color:'var(--text2)',cursor:'pointer',fontSize:16}}>›</button>
        </div>
        <button style={btn('primary')} onClick={openModal}>＋ Add patient</button>
      </div>

      <div style={{background:'var(--ab)',border:'1px solid var(--amber)',borderRadius:'var(--r)',padding:'10px 14px',marginBottom:16,fontSize:12,color:'var(--amber)'}}>
        ⚠️ <strong>Twilio trial note:</strong> Patients must text <strong>"join tribe-smallest"</strong> to <strong>+1 415 523 8886</strong> on WhatsApp once before they can receive messages from Sophie. When you upgrade to a real Twilio number, this is not required.
      </div>

      <div style={card}>
        <div style={cardHead}>
          <div><div style={{fontSize:13,fontWeight:600}}>Patient appointments</div><div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>Click any row to view full patient details</div></div>
          <button style={btn()} onClick={load}>↻ Refresh</button>
        </div>
        <div style={{display:'flex',gap:6,padding:'10px 18px',borderBottom:'1px solid var(--border)',background:'var(--bg3)',flexWrap:'wrap',alignItems:'center'}}>
          {['all','confirmed','pending','cancelled'].map(f=>(
            <button key={f} onClick={()=>setFilter(f)} style={{padding:'4px 12px',borderRadius:20,fontSize:11,fontWeight:500,border:'1px solid',cursor:'pointer',transition:'all .15s',
              background:filter===f?'var(--gb)':'transparent',color:filter===f?'var(--green)':'var(--text2)',borderColor:filter===f?'var(--gbd)':'var(--border)'}}>
              {f.charAt(0).toUpperCase()+f.slice(1)}
            </button>
          ))}
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search patient..." style={{...inp,marginLeft:'auto',width:180,padding:'5px 10px'}}/>
        </div>
        {loading?<Spin/>:filtered.length===0?<Empty msg="No appointments found"/>:(
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead>
                <tr style={{background:'var(--bg3)'}}>
                  {['Patient','Time','Practitioner','Status','Reminder','Actions'].map(h=>(
                    <th key={h} style={{padding:'9px 18px',textAlign:'left',fontSize:10,fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--text3)',borderBottom:'1px solid var(--border)',fontFamily:'var(--mono)',whiteSpace:'nowrap'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map((a,i)=>(
                  <tr key={i} style={{borderBottom:'1px solid var(--border)',cursor:'pointer'}}
                    onClick={()=>setSelected(a)}
                    onMouseOver={e=>e.currentTarget.style.background='var(--bg3)'}
                    onMouseOut={e=>e.currentTarget.style.background='transparent'}>
                    <td style={{padding:'13px 18px'}}>
                      <div style={{display:'flex',alignItems:'center',gap:10}}>
                        <Avatar name={a['Patient Name']||'?'}/>
                        <div>
                          <div style={{fontWeight:500,fontSize:13}}>{a['Patient Name']||'Unknown'}</div>
                          <div style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)'}}>{a['Phone Number']||'No phone ⚠️'}</div>
                        </div>
                      </div>
                    </td>
                    <td style={{padding:'13px 18px'}}><span style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,padding:'3px 10px',fontSize:12,fontFamily:'var(--mono)'}}>{a['Appointment Time']||'—'}</span></td>
                    <td style={{padding:'13px 18px',color:'var(--text2)',fontSize:12}}>{(a['Practitioner']||'—').split('—')[0].trim()}</td>
                    <td style={{padding:'13px 18px'}}><StatusPill status={a['Status']}/></td>
                    <td style={{padding:'13px 18px'}}><ReminderPill val={a['Reminder Sent']||a['Reminder 24hr']}/></td>
                    <td style={{padding:'13px 18px'}}>
                      <div style={{display:'flex',gap:6}} onClick={e=>e.stopPropagation()}>
                        <button style={{...btn(),background:'var(--gb)',color:'var(--green)',borderColor:'var(--gbd)',fontSize:11,padding:'4px 10px'}} onClick={e=>sendReminder(a,e)}>Send reminder</button>
                        <button style={{...btn(),fontSize:11,padding:'4px 10px'}} onClick={e=>confirm(a,e)}>Confirm</button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
      <PatientDetailModal patient={selected} open={!!selected} onClose={()=>setSelected(null)} showToast={showToast} onRefresh={load}/>
    </div>
  );
};

// ── CHAT ──────────────────────────────────────────────────────────────────────
const Chat = ({showToast})=>{
  const [convos,setConvos]=useState([]);
  const [sel,setSel]=useState(null);
  const [msg,setMsg]=useState('');
  const [loading,setLoading]=useState(true);
  const [sending,setSending]=useState(false);
  const msgsEnd=useRef(null);

  const load=useCallback(async()=>{
    const d=await api.get('/api/chat/conversations');
    setConvos(d.conversations||[]);
    setLoading(false);
  },[]);

  useEffect(()=>{load();const t=setInterval(load,15000);return()=>clearInterval(t);},[load]);
  useEffect(()=>{msgsEnd.current?.scrollIntoView({behavior:'smooth'});},[sel]);

  const send=async()=>{
    if(!msg.trim()||!sel)return;
    setSending(true);
    const r=await api.post('/api/chat/send',{phone:sel.phone,name:sel.name,message:msg});
    if(r.success){showToast('Message sent');setMsg('');load();}
    else showToast('Failed — check Twilio sandbox','error');
    setSending(false);
  };

  return(
    <div style={{animation:'fadeIn .2s ease'}}>
      <div style={{background:'var(--ab)',border:'1px solid var(--amber)',borderRadius:'var(--r)',padding:'10px 14px',marginBottom:16,fontSize:12,color:'var(--amber)'}}>
        ⚠️ <strong>Twilio trial:</strong> Conversations appear here after patients message Sophie on WhatsApp. Patient must first text <strong>"join tribe-smallest"</strong> to +1 415 523 8886.
      </div>
      <div style={card}>
        <div style={{display:'grid',gridTemplateColumns:'260px 1fr',height:580}}>
          <div style={{borderRight:'1px solid var(--border)',overflowY:'auto',background:'var(--bg3)'}}>
            <div style={{padding:'10px 14px',borderBottom:'1px solid var(--border)',fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              Conversations ({convos.length})
              <button onClick={load} style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:14}}>↻</button>
            </div>
            {loading?<Spin/>:convos.length===0?
              <div style={{padding:20,textAlign:'center'}}>
                <div style={{fontSize:24,marginBottom:8}}>💬</div>
                <div style={{fontSize:12,color:'var(--text3)'}}>No conversations yet</div>
                <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>Patients appear here when they message Sophie on WhatsApp</div>
              </div>:
              convos.map((c,i)=>(
                <div key={i} onClick={()=>setSel(c)} style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',borderBottom:'1px solid var(--border)',cursor:'pointer',transition:'all .1s',
                  background:sel?.phone===c.phone?'var(--gb)':'transparent',
                  borderLeft:sel?.phone===c.phone?'2px solid var(--green)':'2px solid transparent'}}
                  onMouseOver={e=>{if(sel?.phone!==c.phone)e.currentTarget.style.background='var(--bg4)'}}
                  onMouseOut={e=>{if(sel?.phone!==c.phone)e.currentTarget.style.background='transparent'}}>
                  <Avatar name={c.name||'?'}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:500}}>{c.name||'Unknown'}</div>
                    <div style={{fontSize:11,color:'var(--text3)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:150}}>
                      {c.messages?.length?c.messages[c.messages.length-1]?.text?.slice(0,35)+'...':c.phone}
                    </div>
                  </div>
                  <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',flexShrink:0}}>{c.messages?.length||0} msg</div>
                </div>
              ))
            }
          </div>
          <div style={{display:'flex',flexDirection:'column'}}>
            {sel?(
              <>
                <div style={{padding:'12px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10,background:'var(--bg2)'}}>
                  <Avatar name={sel.name||'?'}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:600}}>{sel.name||'Unknown'}</div>
                    <div style={{fontSize:11,color:'var(--green)',fontFamily:'var(--mono)'}}>{sel.phone}</div>
                  </div>
                  <StatusPill status={sel.status}/>
                </div>
                <div style={{flex:1,overflowY:'auto',padding:16,display:'flex',flexDirection:'column',gap:10,background:'var(--bg)'}}>
                  {(!sel.messages||sel.messages.length===0)?
                    <Empty msg="No messages yet in this conversation"/>:
                    sel.messages.map((m,i)=>(
                      <div key={i} style={{maxWidth:'72%',padding:'10px 14px',borderRadius:12,fontSize:13,lineHeight:1.5,
                        alignSelf:m.role==='sophie'?'flex-start':'flex-end',
                        background:m.role==='sophie'?'var(--green)':'var(--bg2)',
                        color:m.role==='sophie'?'#000':'var(--text)',
                        border:m.role==='patient'?'1px solid var(--border)':'none',
                        borderBottomLeftRadius:m.role==='sophie'?3:12,
                        borderBottomRightRadius:m.role==='patient'?3:12}}>
                        {m.text}
                        <div style={{fontSize:10,opacity:0.6,marginTop:4,fontFamily:'var(--mono)'}}>{m.time}</div>
                      </div>
                    ))
                  }
                  <div ref={msgsEnd}/>
                </div>
                <div style={{padding:'12px 16px',borderTop:'1px solid var(--border)',display:'flex',gap:8,background:'var(--bg2)'}}>
                  <input value={msg} onChange={e=>setMsg(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="Send a message as Sophie..." style={{...inp,borderRadius:20,flex:1}}/>
                  <button onClick={send} disabled={sending||!msg.trim()} style={{background:'var(--green)',color:'#000',border:'none',borderRadius:20,padding:'9px 18px',fontSize:13,fontWeight:600,cursor:'pointer',opacity:(sending||!msg.trim())?.5:1}}>
                    {sending?'...':'Send'}
                  </button>
                </div>
              </>
            ):(
              <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:'var(--text3)',fontSize:13,gap:8}}>
                <div style={{fontSize:32}}>💬</div>
                <div>Select a conversation to view messages</div>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
};

// ── SETTINGS ──────────────────────────────────────────────────────────────────
const Settings = ({clinic,theme,setTheme,showToast})=>{
  const [sec,setSec]=useState('general');
  const [settings,setSettings]=useState(null);
  const [saving,setSaving]=useState(false);
  const [clinicForm,setClinicForm]=useState({});

  useEffect(()=>{
    api.get('/api/settings').then(d=>{
      setSettings(d);
      setClinicForm({
        clinic_name:d.clinic_name||'',
        clinic_address:d.clinic_address||'',
        clinic_phone:d.clinic_phone||'',
        clinic_hours:d.clinic_hours||'',
        sophie_name:d.sophie_name||'Sophie',
      });
    });
  },[]);

  const updateSetting = async(key,val)=>{
    const updated={...settings,[key]:val};
    setSettings(updated);
    await api.post('/api/settings',{[key]:val});
    if(key==='dark_mode')setTheme(val?'dark':'light');
    if(key==='accent_color'){
      document.documentElement.style.setProperty('--green',val);
      document.documentElement.style.setProperty('--green2',val);
    }
    showToast('Setting saved');
  };

  const saveClinic = async()=>{
    setSaving(true);
    await api.post('/api/settings',clinicForm);
    setSaving(false);
    showToast('Clinic details saved!');
  };

  const Row=({label,desc,settingKey,right})=>(
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 0',borderBottom:'1px solid var(--border)'}}>
      <div><div style={{fontSize:13,fontWeight:500}}>{label}</div>{desc&&<div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{desc}</div>}</div>
      {right||( settingKey && settings &&
        <Toggle checked={!!settings[settingKey]} onChange={v=>updateSetting(settingKey,v)}/>
      )}
    </div>
  );

  if(!settings)return <Spin/>;

  const sections=['general','appearance','sophie','reminders','clinic'];
  return(
    <div style={{display:'grid',gridTemplateColumns:'180px 1fr',gap:20,animation:'fadeIn .2s ease'}}>
      <div style={{display:'flex',flexDirection:'column',gap:2}}>
        {sections.map(s=>(
          <div key={s} onClick={()=>setSec(s)} style={{padding:'8px 12px',borderRadius:8,fontSize:13,color:sec===s?'var(--text)':'var(--text2)',background:sec===s?'var(--bg3)':'transparent',cursor:'pointer',fontWeight:sec===s?500:400,transition:'all .15s'}}>
            {s==='sophie'?'Sophie AI':s==='clinic'?'Clinic details':s.charAt(0).toUpperCase()+s.slice(1)}
          </div>
        ))}
      </div>
      <div style={{...card,padding:20}}>
        {sec==='general'&&<>
          <div style={{fontSize:15,fontWeight:600,marginBottom:4}}>General settings</div>
          <div style={{fontSize:12,color:'var(--text3)',marginBottom:20}}>Manage your clinic preferences</div>
          <Row label="Auto-refresh" desc="Refresh appointment data every 60 seconds" settingKey="auto_refresh"/>
          <Row label="Email notifications" desc="Get emailed when a patient cancels" settingKey="email_notifications"/>
          <Row label="Sound alerts" desc="Play a sound when Sophie gets a reply" settingKey="sound_alerts"/>
        </>}
        {sec==='appearance'&&<>
          <div style={{fontSize:15,fontWeight:600,marginBottom:4}}>Appearance</div>
          <div style={{fontSize:12,color:'var(--text3)',marginBottom:20}}>Customise how the dashboard looks</div>
          <Row label="Dark mode" desc="Use dark theme across the dashboard" right={<Toggle checked={theme==='dark'} onChange={v=>{setTheme(v?'dark':'light');updateSetting('dark_mode',v);}}/>}/>
          <div style={{paddingTop:14}}>
            <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>Accent colour</div>
            <div style={{display:'flex',gap:8}}>
              {['#00d97e','#4d9fff','#a78bfa','#f5a623','#ff4d6d','#06b6d4'].map(c=>(
                <div key={c} onClick={()=>updateSetting('accent_color',c)}
                  style={{width:26,height:26,borderRadius:'50%',background:c,cursor:'pointer',transition:'all .15s',border:settings.accent_color===c?'2px solid white':'2px solid transparent'}}
                  onMouseOver={e=>e.currentTarget.style.transform='scale(1.15)'}
                  onMouseOut={e=>e.currentTarget.style.transform='scale(1)'}/>
              ))}
            </div>
          </div>
        </>}
        {sec==='sophie'&&<>
          <div style={{fontSize:15,fontWeight:600,marginBottom:4}}>Sophie AI settings</div>
          <div style={{fontSize:12,color:'var(--text3)',marginBottom:20}}>Configure how Sophie communicates with patients</div>
          <Row label="Send welcome message on booking" desc="New patients get an instant WhatsApp confirmation when added" settingKey="welcome_message"/>
          <Row label="Auto-confirm on YES reply" desc="Status updates automatically when patient replies YES" settingKey="auto_confirm"/>
          <Row label="Handle reschedule requests" desc="Sophie offers new time slots when patient says NO" settingKey="handle_reschedule"/>
          <Row label="Post-visit follow-up" desc="Sophie checks in 2 hours after the appointment" settingKey="post_visit_followup"/>
          <div style={{paddingTop:16}}>
            <label style={{fontSize:11,fontWeight:600,color:'var(--text2)',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.05em',fontFamily:'var(--mono)'}}>Sophie's name</label>
            <div style={{display:'flex',gap:8}}>
              <input defaultValue={settings.sophie_name||'Sophie'} style={{...inp,flex:1}} id="sophie-name-input"/>
              <button style={btn('primary')} onClick={()=>updateSetting('sophie_name',document.getElementById('sophie-name-input').value)}>Save</button>
            </div>
          </div>
        </>}
        {sec==='reminders'&&<>
          <div style={{fontSize:15,fontWeight:600,marginBottom:4}}>Reminder settings</div>
          <div style={{fontSize:12,color:'var(--text3)',marginBottom:20}}>Control when Sophie sends automatic reminders — all run in the background 24/7</div>
          <div style={{background:'var(--gb)',border:'1px solid var(--gbd)',borderRadius:'var(--r)',padding:'10px 14px',marginBottom:16,fontSize:12,color:'var(--green)'}}>
            ✓ Reminders run automatically in the background every 30 minutes. No action needed.
          </div>
          <Row label="24 hour reminder" desc="Sophie messages patient the day before their appointment" settingKey="reminder_24hr"/>
          <Row label="1 hour reminder" desc="Sophie messages patient 1 hour before appointment" settingKey="reminder_1hr"/>
          <Row label="30 min follow-up" desc="Follow up if patient didn't reply to 24hr reminder" settingKey="reminder_30min"/>
          <div style={{paddingTop:16}}>
            <label style={{fontSize:11,fontWeight:600,color:'var(--text2)',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.05em',fontFamily:'var(--mono)'}}>Daily reminder time</label>
            <div style={{display:'flex',gap:8}}>
              <input type="time" defaultValue={settings.reminder_time||'14:00'} style={{...inp,width:160}} id="reminder-time-input"/>
              <button style={btn('primary')} onClick={()=>updateSetting('reminder_time',document.getElementById('reminder-time-input').value)}>Save</button>
            </div>
          </div>
        </>}
        {sec==='clinic'&&<>
          <div style={{fontSize:15,fontWeight:600,marginBottom:4}}>Clinic details</div>
          <div style={{fontSize:12,color:'var(--text3)',marginBottom:20}}>Sophie uses this information in all conversations with patients</div>
          {[
            {l:'Clinic name',k:'clinic_name',ph:'Melbourne Physio'},
            {l:'Address',k:'clinic_address',ph:'123 Collins St, Melbourne'},
            {l:'Phone',k:'clinic_phone',ph:'(03) 9000 0000'},
            {l:'Opening hours',k:'clinic_hours',ph:'Monday to Friday, 8am to 6pm'},
          ].map(f=>(
            <FG key={f.l} label={f.l}>
              <input value={clinicForm[f.k]||''} onChange={e=>setClinicForm(prev=>({...prev,[f.k]:e.target.value}))} placeholder={f.ph} style={inp}/>
            </FG>
          ))}
          <button style={{...btn('primary'),opacity:saving?.6:1}} onClick={saveClinic} disabled={saving}>
            {saving?'Saving...':'Save clinic details'}
          </button>
        </>}
      </div>
    </div>
  );
};

// ── ADD PATIENT MODAL ─────────────────────────────────────────────────────────
const AddPatient = ({open,onClose,onSuccess,clinic})=>{
  const [form,setForm]=useState({name:'',phone:'',date:'',time:'',practitioner:'',notes:''});
  const [err,setErr]=useState('');
  const [saving,setSaving]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const save=async()=>{
    if(!form.name||!form.phone||!form.date||!form.time){setErr('Please fill in all required fields.');return;}
    if(!form.phone.startsWith('+')){setErr('Phone number must start with + and country code e.g. +61432997469');return;}
    setSaving(true);setErr('');
    const r=await api.post('/api/book',{...form,send_welcome:true});
    setSaving(false);
    if(r.success){onSuccess();onClose();setForm({name:'',phone:'',date:'',time:'',practitioner:'',notes:''});}
    else setErr(r.error||'Failed to save.');
  };

  return(
    <Modal open={open} onClose={onClose} title="Add new patient" subtitle="Sophie will automatically send them a WhatsApp welcome message">
      <div style={{background:'var(--gb)',border:'1px solid var(--gbd)',borderRadius:'var(--r)',padding:'10px 14px',marginBottom:16,fontSize:12,color:'var(--green)'}}>
        ✓ Sophie will automatically message this patient on WhatsApp when you save — confirming their appointment details.
      </div>
      <FG label="Patient name *"><input value={form.name} onChange={e=>set('name',e.target.value)} placeholder="James Smith" style={inp}/></FG>
      <FG label="WhatsApp number * (must include country code)">
        <input value={form.phone} onChange={e=>set('phone',e.target.value)} placeholder="+61432997469" style={inp}/>
        <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>Patient must have previously texted "join tribe-smallest" to +1 415 523 8886 (Twilio trial limitation)</div>
      </FG>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <FG label="Date *"><input type="date" value={form.date} onChange={e=>set('date',e.target.value)} min={new Date().toISOString().split('T')[0]} style={inp}/></FG>
        <FG label="Time *">
          <select value={form.time} onChange={e=>set('time',e.target.value)} style={inp}>
            <option value="">Select time</option>
            <option>9:00 AM</option><option>11:00 AM</option><option>2:00 PM</option><option>4:00 PM</option>
          </select>
        </FG>
      </div>
      <FG label="Practitioner">
        <select value={form.practitioner} onChange={e=>set('practitioner',e.target.value)} style={inp}>
          {(clinic?.practitioners||[]).map(p=><option key={p}>{p}</option>)}
          <option>Any available</option>
        </select>
      </FG>
      <FG label="Notes"><textarea value={form.notes} onChange={e=>set('notes',e.target.value)} placeholder="Any relevant notes..." style={{...inp,resize:'vertical',minHeight:60}}/></FG>
      {err&&<div style={{color:'var(--red)',fontSize:12,marginBottom:8}}>{err}</div>}
      <div style={{display:'flex',gap:10}}>
        <button style={{...btn(),flex:1,justifyContent:'center'}} onClick={onClose}>Cancel</button>
        <button style={{...btn('primary'),flex:2,justifyContent:'center',opacity:saving?.6:1}} onClick={save} disabled={saving}>
          {saving?'Saving & sending message...':'Save + send welcome message'}
        </button>
      </div>
    </Modal>
  );
};

// ── APP ───────────────────────────────────────────────────────────────────────
const App=()=>{
  const [page,setPage]=useState('dashboard');
  const [theme,setTheme]=useState('dark');
  const [toast,setToast]=useState(null);
  const [modalOpen,setModalOpen]=useState(false);
  const [clinic,setClinic]=useState(null);
  const [rk,setRk]=useState(0);

  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);},[theme]);
  useEffect(()=>{api.get('/api/clinic').then(setClinic);},[]);

  const showToast=(msg,type='success')=>{setToast({msg,type});setTimeout(()=>setToast(null),4000);};
  const pages={dashboard:'Overview',appointments:'Appointments',patients:'Patients',chat:'Live chat',analytics:'Analytics',settings:'Settings'};

  return(
    <>
      <style>{`@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,217,126,0.4)}50%{box-shadow:0 0 0 6px rgba(0,217,126,0)}}button:focus{outline:none}input:focus,select:focus,textarea:focus{border-color:var(--green)!important;box-shadow:0 0 0 3px rgba(0,217,126,0.08)}`}</style>
      <Sidebar page={page} setPage={setPage} clinic={clinic}/>
      <div style={{marginLeft:'var(--sw)',minHeight:'100vh',display:'flex',flexDirection:'column'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 24px',borderBottom:'1px solid var(--border)',background:'var(--bg2)',position:'sticky',top:0,zIndex:50,flexWrap:'wrap',gap:10}}>
          <div>
            <div style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)'}}>clinic-os / {page}</div>
            <div style={{fontSize:15,fontWeight:600,color:'var(--text)'}}>{pages[page]}</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <button onClick={()=>setTheme(t=>t==='dark'?'light':'dark')} style={{width:32,height:32,borderRadius:8,border:'1px solid var(--border)',background:'var(--bg3)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:16}}>{theme==='dark'?'☀️':'🌙'}</button>
            <button onClick={()=>setRk(k=>k+1)} style={{width:32,height:32,borderRadius:8,border:'1px solid var(--border)',background:'var(--bg3)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'var(--text2)',fontSize:16}}>↻</button>
            <button style={btn('primary')} onClick={()=>setModalOpen(true)}>＋ Add patient</button>
          </div>
        </div>
        <div style={{padding:'22px 24px',flex:1}}>
          {page==='dashboard'&&<Dashboard key={rk} openModal={()=>setModalOpen(true)} setPage={setPage} showToast={showToast}/>}
          {page==='appointments'&&<Appointments key={rk} openModal={()=>setModalOpen(true)} showToast={showToast}/>}
          {page==='patients'&&<Patients key={rk} openModal={()=>setModalOpen(true)} showToast={showToast}/>}
          {page==='chat'&&<Chat showToast={showToast}/>}
          {page==='analytics'&&<Analytics key={rk}/>}
          {page==='settings'&&<Settings clinic={clinic} theme={theme} setTheme={setTheme} showToast={showToast}/>}
        </div>
      </div>
      <AddPatient open={modalOpen} onClose={()=>setModalOpen(false)} onSuccess={()=>{showToast('Patient added! Welcome message sent via WhatsApp.');setRk(k=>k+1);}} clinic={clinic}/>
      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
