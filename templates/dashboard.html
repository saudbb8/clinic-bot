<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sophie — Clinic OS</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --bg:#0d0f14;--bg2:#13161d;--bg3:#1a1e28;--bg4:#222736;
  --border:#2a2f3e;--border2:#353c50;
  --text:#e8eaf0;--text2:#8890a4;--text3:#4a5168;
  --green:#00d97e;--green2:#00b868;--green-bg:rgba(0,217,126,0.08);--green-border:rgba(0,217,126,0.2);
  --amber:#f5a623;--amber-bg:rgba(245,166,35,0.08);
  --red:#ff4d6d;--red-bg:rgba(255,77,109,0.08);
  --blue:#4d9fff;--blue-bg:rgba(77,159,255,0.08);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,0.08);
  --font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;
  --sidebar:220px;--r:10px;--r2:14px;
}
[data-theme="light"]{
  --bg:#f0f4f8;--bg2:#ffffff;--bg3:#f4f6fb;--bg4:#e8ecf5;
  --border:#e2e6f0;--border2:#cdd3e8;
  --text:#0d0f14;--text2:#4a5168;--text3:#8890a4;
  --green:#00a86b;--green2:#008f5a;--green-bg:rgba(0,168,107,0.08);--green-border:rgba(0,168,107,0.2);
  --amber:#c47d0a;--amber-bg:rgba(196,125,10,0.08);
  --red:#d63057;--red-bg:rgba(214,48,87,0.08);
  --blue:#2b7fe0;--blue-bg:rgba(43,127,224,0.08);
  --purple:#7c3aed;--purple-bg:rgba(124,58,237,0.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;transition:background 0.2s,color 0.2s}
a{color:inherit;text-decoration:none}
button{font-family:var(--font);cursor:pointer}
input,select,textarea{font-family:var(--font)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── API ───────────────────────────────────────────────────────────────────────
const api = {
  get: (url) => fetch(url).then(r => r.json()),
  post: (url, data) => fetch(url, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}).then(r=>r.json()),
};

// ── UTILS ─────────────────────────────────────────────────────────────────────
const fmtDate = (d) => {
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  return `${dd}/${mm}/${d.getFullYear()}`;
};
const fmtDisplay = (d) => {
  const t = new Date(); const tm = new Date(t); tm.setDate(t.getDate()+1);
  if (d.toDateString()===t.toDateString()) return 'Today';
  if (d.toDateString()===tm.toDateString()) return 'Tomorrow';
  return d.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
};
const initials = (n) => (n||'?').split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2);
const avatarColor = (n) => {
  const colors = ['green','blue','purple','amber'];
  return colors[((n||'A').charCodeAt(0))%colors.length];
};

// ── STYLES ────────────────────────────────────────────────────────────────────
const S = {
  sidebar: {position:'fixed',left:0,top:0,bottom:0,width:'var(--sidebar)',background:'var(--bg2)',borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',zIndex:100},
  main: {marginLeft:'var(--sidebar)',minHeight:'100vh',display:'flex',flexDirection:'column'},
  topbar: {display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 24px',borderBottom:'1px solid var(--border)',background:'var(--bg2)',position:'sticky',top:0,zIndex:50,flexWrap:'wrap',gap:10},
  content: {padding:'22px 24px',flex:1},
  card: {background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--r2)',overflow:'hidden',marginBottom:16},
  cardHead: {display:'flex',alignItems:'center',justifyContent:'space-between',padding:'13px 18px',borderBottom:'1px solid var(--border)',flexWrap:'wrap',gap:8},
  cardTitle: {fontSize:13,fontWeight:600,color:'var(--text)'},
  cardSub: {fontSize:11,color:'var(--text3)',marginTop:2},
  btn: (variant='ghost') => ({
    display:'inline-flex',alignItems:'center',gap:6,padding:'7px 14px',borderRadius:'var(--r)',fontSize:13,fontWeight:500,border:'1px solid',cursor:'pointer',transition:'all 0.15s',
    ...(variant==='primary' ? {background:'var(--green)',color:'var(--bg)',borderColor:'var(--green)'} : {background:'transparent',color:'var(--text2)',borderColor:'var(--border)'}),
  }),
  iconBtn: {width:32,height:32,borderRadius:8,border:'1px solid var(--border)',background:'var(--bg3)',display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer',transition:'all 0.15s',color:'var(--text2)',alignItems:'center',justifyContent:'center'},
  pill: (type) => {
    const map = {confirmed:{bg:'var(--green-bg)',c:'var(--green)'},pending:{bg:'var(--amber-bg)',c:'var(--amber)'},cancelled:{bg:'var(--red-bg)',c:'var(--red)'},sent:{bg:'var(--blue-bg)',c:'var(--blue)'},none:{bg:'var(--bg4)',c:'var(--text3)'}};
    const m = map[type]||map.none;
    return {display:'inline-flex',alignItems:'center',gap:4,padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:500,background:m.bg,color:m.c,whiteSpace:'nowrap',fontFamily:'var(--mono)'};
  },
  avatar: (color) => {
    const map = {green:{bg:'var(--green-bg)',c:'var(--green)'},blue:{bg:'var(--blue-bg)',c:'var(--blue)'},purple:{bg:'var(--purple-bg)',c:'var(--purple)'},amber:{bg:'var(--amber-bg)',c:'var(--amber)'}};
    const m = map[color]||map.green;
    return {width:30,height:30,borderRadius:8,background:m.bg,color:m.c,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,flexShrink:0,fontFamily:'var(--mono)'};
  },
  input: {width:'100%',padding:'8px 12px',border:'1px solid var(--border)',borderRadius:'var(--r)',background:'var(--bg3)',color:'var(--text)',fontSize:13,outline:'none'},
  statCard: (color) => {
    const map = {green:'var(--green)',blue:'var(--blue)',amber:'var(--amber)',red:'var(--red)'};
    return {background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--r2)',padding:'16px 18px',cursor:'pointer',transition:'all 0.15s',borderBottom:`2px solid ${map[color]||map.blue}`,position:'relative'};
  },
};

// ── COMPONENTS ────────────────────────────────────────────────────────────────
const Spinner = () => (
  <div style={{textAlign:'center',padding:40,color:'var(--text3)',fontSize:13}}>Loading...</div>
);

const EmptyState = ({msg='No data found'}) => (
  <div style={{textAlign:'center',padding:48,color:'var(--text3)',fontSize:13}}>{msg}</div>
);

const Toast = ({msg,type,onClose}) => (
  <div style={{position:'fixed',bottom:24,right:24,background:'var(--bg2)',border:`1px solid var(--border)`,borderLeft:`3px solid ${type==='error'?'var(--red)':'var(--green)'}`,padding:'12px 18px',borderRadius:10,fontSize:13,color:'var(--text)',zIndex:999,animation:'slideUp 0.2s ease',boxShadow:'0 4px 20px rgba(0,0,0,0.3)'}}>
    {msg}
  </div>
);

const StatusPill = ({status}) => {
  const s = (status||'').toLowerCase();
  const type = s==='confirmed'||s==='yes' ? 'confirmed' : s==='cancelled'||s==='no' ? 'cancelled' : 'pending';
  const label = type==='confirmed'?'Confirmed':type==='cancelled'?'Cancelled':'Awaiting';
  return <span style={S.pill(type)}>{label}</span>;
};

const ReminderPill = ({val}) => {
  const sent = (val||'').toLowerCase()==='yes'||(val||'').toLowerCase()==='sent';
  return <span style={S.pill(sent?'sent':'none')}>{sent?'Sent':'Not sent'}</span>;
};

const Avatar = ({name,size=30}) => (
  <div style={{...S.avatar(avatarColor(name)),width:size,height:size,fontSize:size===30?10:11}}>{initials(name)}</div>
);

const Modal = ({open,onClose,title,subtitle,children}) => {
  if (!open) return null;
  return (
    <div onClick={e=>{if(e.target===e.currentTarget)onClose()}} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.65)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'}}>
      <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:18,padding:28,width:'100%',maxWidth:460,margin:20,maxHeight:'90vh',overflowY:'auto'}}>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:16,fontWeight:600,color:'var(--text)'}}>{title}</div>
          {subtitle && <div style={{fontSize:12,color:'var(--text3)',marginTop:3}}>{subtitle}</div>}
        </div>
        {children}
      </div>
    </div>
  );
};

const FormGroup = ({label,children}) => (
  <div style={{marginBottom:14}}>
    <label style={{display:'block',fontSize:11,fontWeight:600,color:'var(--text2)',marginBottom:5,textTransform:'uppercase',letterSpacing:'0.05em',fontFamily:'var(--mono)'}}>{label}</label>
    {children}
  </div>
);

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
const Sidebar = ({page,setPage,clinic}) => {
  const navItem = (id,label,icon) => (
    <div onClick={()=>setPage(id)} style={{display:'flex',alignItems:'center',gap:9,padding:'8px 10px',borderRadius:8,color:page===id?'var(--green)':'var(--text2)',background:page===id?'var(--green-bg)':'transparent',fontSize:13,fontWeight:page===id?500:400,cursor:'pointer',marginBottom:1,transition:'all 0.15s',userSelect:'none'}}
      onMouseOver={e=>{if(page!==id)e.currentTarget.style.background='var(--bg3)'}}
      onMouseOut={e=>{if(page!==id)e.currentTarget.style.background='transparent'}}>
      <span style={{fontSize:16}}>{icon}</span>
      <span>{label}</span>
    </div>
  );
  return (
    <div style={S.sidebar}>
      <div style={{padding:'18px 16px 14px',borderBottom:'1px solid var(--border)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:32,height:32,borderRadius:9,background:'var(--green)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 0 16px rgba(0,217,126,0.3)',flexShrink:0}}>
            <span style={{fontSize:16}}>📍</span>
          </div>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:'var(--text)',lineHeight:1.2}}>{clinic?.name||'Clinic OS'}</div>
            <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)'}}>clinic-os v1.0</div>
          </div>
        </div>
      </div>
      <nav style={{padding:'8px 10px',flex:1,overflowY:'auto'}}>
        <div style={{fontSize:10,color:'var(--text3)',fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',padding:'12px 8px 4px'}}>Overview</div>
        {navItem('dashboard','Dashboard','📊')}
        <div style={{fontSize:10,color:'var(--text3)',fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',padding:'12px 8px 4px'}}>Clinic</div>
        {navItem('appointments','Appointments','📅')}
        {navItem('patients','Patients','👥')}
        <div style={{fontSize:10,color:'var(--text3)',fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',padding:'12px 8px 4px'}}>Sophie AI</div>
        {navItem('chat','Live chat','💬')}
        {navItem('analytics','Analytics','📈')}
        <div style={{fontSize:10,color:'var(--text3)',fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',padding:'12px 8px 4px'}}>System</div>
        {navItem('settings','Settings','⚙️')}
      </nav>
      <div style={{padding:14,borderTop:'1px solid var(--border)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,background:'var(--green-bg)',border:'1px solid var(--green-border)',borderRadius:8,padding:'9px 12px'}}>
          <div style={{width:7,height:7,borderRadius:'50%',background:'var(--green)',animation:'pulse 2s ease infinite',flexShrink:0}}></div>
          <div>
            <div style={{fontSize:11,fontWeight:500,color:'var(--green)',fontFamily:'var(--mono)'}}>Sophie online</div>
            <div style={{fontSize:10,color:'var(--text3)'}}>AI receptionist active</div>
          </div>
        </div>
      </div>
    </div>
  );
};

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
const Dashboard = ({openModal,setPage,showToast}) => {
  const [stats,setStats] = useState(null);
  const [appts,setAppts] = useState([]);
  const [date,setDate] = useState(new Date());
  const [loading,setLoading] = useState(true);

  const load = useCallback(async() => {
    setLoading(true);
    const [s,a] = await Promise.all([
      api.get('/api/stats'),
      api.get(`/api/appointments?date=${encodeURIComponent(fmtDate(date))}`)
    ]);
    setStats(s); setAppts(a.appointments||[]); setLoading(false);
  },[date]);

  useEffect(()=>{load();},[load]);

  const changeDate = (d) => { const nd=new Date(date); nd.setDate(nd.getDate()+d); setDate(nd); };

  return (
    <div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:22}}>
        {[
          {label:'Today',val:stats?.today_total??'—',sub:'appointments',color:'blue',icon:'📅'},
          {label:'Confirmed',val:stats?.confirmed??'—',sub:`${stats?.confirmation_rate??0}% rate`,color:'green',icon:'✅'},
          {label:'Awaiting',val:stats?.pending??'—',sub:'reminder sent',color:'amber',icon:'⏳'},
          {label:'Cancelled',val:stats?.cancelled??'—',sub:'this week: '+stats?.week_noshows,color:'red',icon:'❌'},
        ].map(s=>(
          <div key={s.label} style={S.statCard(s.color)} onClick={()=>s.label==='Today'&&setPage('appointments')}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
              <span style={{fontSize:20}}>{s.icon}</span>
              <span style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--text3)'}}>{s.sub}</span>
            </div>
            <div style={{fontSize:30,fontWeight:700,color:'var(--text)',fontFamily:'var(--mono)',lineHeight:1,marginBottom:4}}>{s.val}</div>
            <div style={{fontSize:12,color:'var(--text2)'}}>{s.label}</div>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 300px',gap:16}}>
        <div style={S.card}>
          <div style={S.cardHead}>
            <div>
              <div style={S.cardTitle}>Schedule</div>
              <div style={S.cardSub}>Appointments for {fmtDisplay(date)}</div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:8,padding:'4px 8px'}}>
              <button onClick={()=>changeDate(-1)} style={{background:'none',border:'none',color:'var(--text2)',cursor:'pointer',fontSize:16,padding:'0 2px'}}>‹</button>
              <span style={{fontSize:12,fontFamily:'var(--mono)',color:'var(--text)',minWidth:70,textAlign:'center'}}>{fmtDisplay(date)}</span>
              <button onClick={()=>changeDate(1)} style={{background:'none',border:'none',color:'var(--text2)',cursor:'pointer',fontSize:16,padding:'0 2px'}}>›</button>
            </div>
          </div>
          {loading ? <Spinner/> : appts.length===0 ? <EmptyState msg="No appointments for this date"/> :
            appts.map((a,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 18px',borderBottom:'1px solid var(--border)',transition:'background 0.1s'}}
                onMouseOver={e=>e.currentTarget.style.background='var(--bg3)'}
                onMouseOut={e=>e.currentTarget.style.background='transparent'}>
                <span style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--text2)',minWidth:52}}>{a['Appointment Time']||'—'}</span>
                <Avatar name={a['Patient Name']||'?'}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:500}}>{a['Patient Name']||'Unknown'}</div>
                  <div style={{fontSize:11,color:'var(--text3)'}}>{(a['Practitioner']||'Any').split('—')[0].trim()}</div>
                </div>
                <StatusPill status={a['Status']}/>
              </div>
            ))
          }
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={S.card}>
            <div style={S.cardHead}><div style={S.cardTitle}>Sophie activity</div></div>
            <div style={{padding:'8px 14px'}}>
              {[
                {dot:'var(--green)',title:'24hr reminders sent',sub:'Auto · 2:00 PM today'},
                {dot:'var(--green)',title:'Patient confirmed via WhatsApp',sub:'Auto · No staff needed'},
                {dot:'var(--amber)',title:'Reschedule handled',sub:'Auto · Sophie rebooked'},
                {dot:'var(--green)',title:'1hr reminders sent',sub:'Auto · All notified'},
              ].map((a,i)=>(
                <div key={i} style={{display:'flex',gap:10,padding:'9px 0',borderBottom:i<3?'1px solid var(--border)':'none'}}>
                  <div style={{width:6,height:6,borderRadius:'50%',background:a.dot,marginTop:5,flexShrink:0}}></div>
                  <div>
                    <div style={{fontSize:12,fontWeight:500,color:'var(--text)'}}>{a.title}</div>
                    <div style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)',marginTop:1}}>{a.sub}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div style={S.card}>
            <div style={S.cardHead}><div style={S.cardTitle}>Savings this month</div></div>
            <div style={{padding:14,display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              {[
                {val:'$2,400',label:'Revenue saved',c:'var(--green)'},
                {val:'-83%',label:'No-shows',c:'var(--blue)'},
                {val:'14h',label:'Receptionist time',c:'var(--purple)'},
                {val:'6x',label:'ROI on Sophie',c:'var(--amber)'},
              ].map(s=>(
                <div key={s.label} style={{background:'var(--bg3)',borderRadius:8,padding:'10px 12px'}}>
                  <div style={{fontSize:20,fontWeight:700,color:s.c,fontFamily:'var(--mono)'}}>{s.val}</div>
                  <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>{s.label}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

// ── APPOINTMENTS ──────────────────────────────────────────────────────────────
const Appointments = ({openModal,showToast}) => {
  const [appts,setAppts] = useState([]);
  const [loading,setLoading] = useState(true);
  const [date,setDate] = useState(new Date());
  const [filter,setFilter] = useState('all');
  const [search,setSearch] = useState('');

  const load = useCallback(async()=>{
    setLoading(true);
    const d = await api.get(`/api/appointments?date=${encodeURIComponent(fmtDate(date))}`);
    setAppts(d.appointments||[]); setLoading(false);
  },[date]);

  useEffect(()=>{load();},[load]);

  const changeDate = (d) => { const nd=new Date(date); nd.setDate(nd.getDate()+d); setDate(nd); };

  const filtered = appts.filter(a => {
    const s = (a['Status']||'').toLowerCase();
    const match = filter==='confirmed'?(s==='confirmed'||s==='yes'):filter==='pending'?(!s||s==='awaiting'||s==='pending'):filter==='cancelled'?(s==='cancelled'||s==='no'):true;
    const q = search.toLowerCase();
    const matchSearch = !q || (a['Patient Name']||'').toLowerCase().includes(q) || (a['Phone Number']||'').includes(q);
    return match && matchSearch;
  });

  const sendReminder = async (a,btn) => {
    btn.disabled=true; btn.textContent='Sending...';
    const r = await api.post('/api/send_reminder',{name:a['Patient Name'],phone:a['Phone Number'],date:a['Appointment Date'],time:a['Appointment Time']});
    if(r.success){showToast('Reminder sent to '+a['Patient Name']);load();}
    else showToast('Failed to send','error');
    btn.disabled=false; btn.textContent='Send reminder';
  };

  const confirm = async (a) => {
    await api.post('/api/update_status',{name:a['Patient Name'],date:a['Appointment Date'],status:'Confirmed'});
    showToast(a['Patient Name']+' confirmed'); load();
  };

  return (
    <div>
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:18,gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:6,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'4px 8px'}}>
          <button onClick={()=>changeDate(-1)} style={{background:'none',border:'none',color:'var(--text2)',cursor:'pointer',fontSize:16}}>‹</button>
          <span style={{fontSize:12,fontFamily:'var(--mono)',color:'var(--text)',minWidth:70,textAlign:'center'}}>{fmtDisplay(date)}</span>
          <button onClick={()=>changeDate(1)} style={{background:'none',border:'none',color:'var(--text2)',cursor:'pointer',fontSize:16}}>›</button>
        </div>
        <button style={S.btn('primary')} onClick={openModal}>＋ Add patient</button>
      </div>
      <div style={S.card}>
        <div style={S.cardHead}>
          <div><div style={S.cardTitle}>Patient appointments</div><div style={S.cardSub}>Sophie sends reminders 24hr and 1hr automatically</div></div>
          <button style={S.btn()} onClick={load}>↻ Refresh</button>
        </div>
        <div style={{display:'flex',gap:6,padding:'10px 18px',borderBottom:'1px solid var(--border)',background:'var(--bg3)',flexWrap:'wrap',alignItems:'center'}}>
          {['all','confirmed','pending','cancelled'].map(f=>(
            <button key={f} onClick={()=>setFilter(f)} style={{padding:'4px 12px',borderRadius:20,fontSize:11,fontWeight:500,border:'1px solid',cursor:'pointer',transition:'all 0.15s',
              background:filter===f?'var(--green-bg)':'transparent',color:filter===f?'var(--green)':'var(--text2)',borderColor:filter===f?'var(--green-border)':'var(--border)'}}>
              {f.charAt(0).toUpperCase()+f.slice(1)}
            </button>
          ))}
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search patient..." style={{...S.input,marginLeft:'auto',width:180,padding:'5px 10px'}}/>
        </div>

const Patients = ({openModal}) => {

  const [loading,setLoading] = useState(true);
  const [search,setSearch] = useState('');

  useEffect(()=>{
    api.get('/api/appointments?date=all').then(d=>{
      const unique = {};
      (d.appointments||[]).forEach(p=>{
        const k = p['Phone Number']||p['Patient Name'];
        if(!unique[k]) unique[k]={...p,count:0};
        unique[k].count++;

      setPatients(Object.values(unique)); setLoading(false);

  const filtered = patients.filter(p=>!search||(p['Patient Name']||'').toLowerCase().includes(search.toLowerCase())||(p['Phone Number']||'').includes(search));

// ── CHAT ─────────────────────────────────────────────────────────────────────
const Chat = ({showToast}) => {
  const [convos,setConvos] = useState([]);
  const [selected,setSelected] = useState(null);
  const [message,setMessage] = useState('');
  const [loading,setLoading] = useState(true);
  const [sending,setSending] = useState(false);
  const messagesEnd = useRef(null);

  const load = useCallback(async()=>{
    const d = await api.get('/api/chat/conversations');
    setConvos(d.conversations||[]);
    if(!selected && d.conversations?.length) setSelected(d.conversations[0]);
    setLoading(false);
  },[]);

  useEffect(()=>{load(); const t=setInterval(load,15000); return()=>clearInterval(t);},[load]);
  useEffect(()=>{messagesEnd.current?.scrollIntoView({behavior:'smooth'});},[selected]);

  const send = async () => {
    if(!message.trim()||!selected) return;
    setSending(true);
    const r = await api.post('/api/chat/send',{phone:selected.phone,name:selected.name,message});
    if(r.success){showToast('Message sent');setMessage('');load();}
    else showToast('Failed to send','error');
    setSending(false);
  };

  const msgs = selected?.messages||[];

  return (
    <div style={S.card}>
      <div style={{display:'grid',gridTemplateColumns:'260px 1fr',height:580}}>
        <div style={{borderRight:'1px solid var(--border)',overflowY:'auto',background:'var(--bg3)'}}>
          <div style={{padding:'10px 14px',borderBottom:'1px solid var(--border)',fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase'}}>
            Conversations ({convos.length})
          </div>
          {loading ? <Spinner/> : convos.length===0 ? <EmptyState msg="No conversations yet. Patients will appear here when they message Sophie."/> :
            convos.map((c,i)=>(
              <div key={i} onClick={()=>setSelected(c)} style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',borderBottom:'1px solid var(--border)',cursor:'pointer',transition:'all 0.1s',
                background:selected?.phone===c.phone?'var(--green-bg)':'transparent',
                borderLeft:selected?.phone===c.phone?'2px solid var(--green)':'2px solid transparent'}}
                onMouseOver={e=>{if(selected?.phone!==c.phone)e.currentTarget.style.background='var(--bg4)'}}
                onMouseOut={e=>{if(selected?.phone!==c.phone)e.currentTarget.style.background='transparent'}}>
                <Avatar name={c.name||'?'}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:500}}>{c.name||'Unknown'}</div>
                  <div style={{fontSize:11,color:'var(--text3)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:150}}>
                    {c.messages?.length ? c.messages[c.messages.length-1]?.text?.slice(0,35)+'...' : c.phone}
                  </div>
                </div>
                <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)'}}>{c.last_appointment||''}</div>
              </div>
            ))
          }
        </div>
        <div style={{display:'flex',flexDirection:'column'}}>
          {selected ? (
            <>
              <div style={{padding:'12px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10,background:'var(--bg2)'}}>
                <Avatar name={selected.name||'?'}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:600}}>{selected.name||'Unknown'}</div>
                  <div style={{fontSize:11,color:'var(--green)',fontFamily:'var(--mono)'}}>{selected.phone} · {selected.status||'Active patient'}</div>
                </div>
                <StatusPill status={selected.status}/>
              </div>
              <div style={{flex:1,overflowY:'auto',padding:16,display:'flex',flexDirection:'column',gap:10,background:'var(--bg)'}}>
                {msgs.length===0 ? <EmptyState msg="No messages yet. Send a message below to start the conversation."/> :
                  msgs.map((m,i)=>(
                    <div key={i} style={{maxWidth:'72%',padding:'10px 14px',borderRadius:12,fontSize:13,lineHeight:1.5,alignSelf:m.role==='sophie'?'flex-start':'flex-end',
                      background:m.role==='sophie'?'var(--green)':'var(--bg2)',
                      color:m.role==='sophie'?'#000':'var(--text)',
                      border:m.role==='patient'?'1px solid var(--border)':'none',
                      borderBottomLeftRadius:m.role==='sophie'?3:12,
                      borderBottomRightRadius:m.role==='patient'?3:12}}>
                      {m.text}
                      <div style={{fontSize:10,opacity:0.6,marginTop:4,fontFamily:'var(--mono)'}}>{m.time}</div>
                    </div>
                  ))
                }
                <div ref={messagesEnd}/>
              </div>
              <div style={{padding:'12px 16px',borderTop:'1px solid var(--border)',display:'flex',gap:8,background:'var(--bg2)'}}>
                <input value={message} onChange={e=>setMessage(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="Send a message as Sophie..." style={{...S.input,borderRadius:20}}/>
                <button onClick={send} disabled={sending||!message.trim()} style={{background:'var(--green)',color:'#000',border:'none',borderRadius:20,padding:'9px 18px',fontSize:13,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap',opacity:sending?0.6:1}}>
                  {sending?'Sending...':'Send'}
                </button>
              </div>
            </>
          ) : (
            <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text3)',fontSize:13}}>
              Select a conversation to view messages
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ── ADD PATIENT MODAL ─────────────────────────────────────────────────────────
const AddPatientModal = ({open,onClose,onSuccess,clinic}) => {
  const [form,setForm] = useState({name:'',phone:'',date:'',time:'',practitioner:'Dr. James Chen — Physiotherapy',notes:''});
  const [err,setErr] = useState('');
  const [saving,setSaving] = useState(false);

  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const save = async () => {
    if(!form.name||!form.phone||!form.date||!form.time){setErr('Please fill in all required fields.');return;}
    setSaving(true); setErr('');
    const r = await api.post('/api/book',form);
    setSaving(false);
    if(r.success){onSuccess(); onClose(); setForm({name:'',phone:'',date:'',time:'',practitioner:'Dr. James Chen — Physiotherapy',notes:''});}
    else setErr(r.error||'Failed to save.');
  };

  return (
    <Modal open={open} onClose={onClose} title="Add new patient" subtitle="Patient will receive automatic WhatsApp reminders from Sophie">
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <FormGroup label="Patient name *"><input value={form.name} onChange={e=>set('name',e.target.value)} placeholder="James Smith" style={S.input}/></FormGroup>
        <FormGroup label="WhatsApp number *"><input value={form.phone} onChange={e=>set('phone',e.target.value)} placeholder="+61 4xx xxx xxx" style={S.input}/></FormGroup>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <FormGroup label="Date *"><input type="date" value={form.date} onChange={e=>set('date',e.target.value)} min={new Date().toISOString().split('T')[0]} style={S.input}/></FormGroup>
        <FormGroup label="Time *">
          <select value={form.time} onChange={e=>set('time',e.target.value)} style={S.input}>
            <option value="">Select time</option>
            <option>9:00 AM</option><option>11:00 AM</option><option>2:00 PM</option><option>4:00 PM</option>
          </select>
        </FormGroup>
      </div>
      <FormGroup label="Practitioner">
        <select value={form.practitioner} onChange={e=>set('practitioner',e.target.value)} style={S.input}>
          {(clinic?.practitioners||['Dr. James Chen — Physiotherapy']).map(p=><option key={p}>{p}</option>)}
          <option>Any available</option>
        </select>
      </FormGroup>
      <FormGroup label="Notes">
        <textarea value={form.notes} onChange={e=>set('notes',e.target.value)} placeholder="Any relevant notes..." style={{...S.input,resize:'vertical',minHeight:64}}/>
      </FormGroup>
      {err && <div style={{color:'var(--red)',fontSize:12,marginBottom:8}}>{err}</div>}
      <div style={{display:'flex',gap:10}}>
        <button style={{...S.btn(),flex:1,justifyContent:'center'}} onClick={onClose}>Cancel</button>
        <button style={{...S.btn('primary'),flex:2,justifyContent:'center',opacity:saving?0.7:1}} onClick={save} disabled={saving}>
          {saving?'Saving...':'Save appointment'}
        </button>
      </div>
    </Modal>
  );
};

  const [page,setPage] = useState('dashboard');
  const [theme,setTheme] = useState('dark');
  const [toast,setToast] = useState(null);
  const [modalOpen,setModalOpen] = useState(false);
  const [clinic,setClinic] = useState(null);
  const [refreshKey,setRefreshKey] = useState(0);

  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);},[theme]);
  useEffect(()=>{api.get('/api/clinic').then(setClinic);},[]);

  const showToast = (msg,type='success') => {
    setToast({msg,type});
    setTimeout(()=>setToast(null),3500);
  };

  const openModal = () => setModalOpen(true);
  const onPatientAdded = () => { showToast('Patient added successfully!'); setRefreshKey(k=>k+1); };

  const pages = {dashboard:'Overview',appointments:'Appointments',patients:'Patients',chat:'Live chat',analytics:'Analytics',settings:'Settings'};

  return (
    <>
      <style>{`
        @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,217,126,0.4)}50%{box-shadow:0 0 0 6px rgba(0,217,126,0)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        button:hover{opacity:0.9}
        *:focus{outline:none}
      `}</style>
      <Sidebar page={page} setPage={(p)=>{setPage(p);}} clinic={clinic}/>
      <div style={S.main}>
        <div style={S.topbar}>
          <div>
            <div style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)'}}>clinic-os / {page}</div>
            <div style={{fontSize:15,fontWeight:600,color:'var(--text)'}}>{pages[page]}</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <button style={S.iconBtn} onClick={()=>setTheme(t=>t==='dark'?'light':'dark')} title="Toggle theme">
              {theme==='dark'?'☀️':'🌙'}
            </button>
            <button style={S.iconBtn} onClick={()=>setRefreshKey(k=>k+1)} title="Refresh">↻</button>
            <button style={S.btn('primary')} onClick={openModal}>＋ Add patient</button>
          </div>
        </div>
        <div style={S.content}>
          {page==='dashboard' && <Dashboard key={refreshKey} openModal={openModal} setPage={setPage} showToast={showToast}/>}
          {page==='appointments' && <Appointments key={refreshKey} openModal={openModal} showToast={showToast}/>}
          {page==='patients' && <Patients key={refreshKey} openModal={openModal}/>}
          {page==='chat' && <Chat showToast={showToast}/>}
          {page==='analytics' && <Analytics key={refreshKey}/>}
          {page==='settings' && <Settings clinic={clinic} theme={theme} setTheme={setTheme} showToast={showToast}/>}
        </div>
      </div>
      <AddPatientModal open={modalOpen} onClose={()=>setModalOpen(false)} onSuccess={onPatientAdded} clinic={clinic}/>
      {toast && <Toast msg={toast.msg} type={toast.type}/>}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
